<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对战系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

body {
    font-family: 'ZCOOL XiaoWei', 'Microsoft YaHei', sans-serif;
    background-color: #000;
    color: #fff;
    overflow: hidden;
    margin: 0;  /* 确保没有margin */
    padding: 0;  /* 确保没有padding */
    display: flex;
    justify-content: center;
    align-items: flex-start;  /* 从center改为flex-start，让内容从顶部开始 */
    width: 100vw;
    height: 100vh;
}

.game-container {
    /* 通过JS动态设置宽高，保持4:3比例 */
    position: relative;
    display: flex;
    flex-direction: column;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    margin-top: 0;  /* 确保紧贴顶部 */
    overflow: hidden;  /* 防止子元素溢出 */
}

/* 背景毛玻璃层 */
.game-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: inherit;
    background-size: inherit;
    background-position: inherit;
    filter: blur(3px);
    z-index: 0;
}

/* 背景遮罩层（让毛玻璃效果更柔和） */
.game-container::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.15);
    z-index: 1;
}

.battle-scene {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: clamp(60px, 12vw, 120px);
}

/* 状态区样式 - 使用clamp适配不同屏幕 */
.player-status-area {
    position: absolute;
    top: clamp(5px, 1vw, 15px);
    left: clamp(5px, 1vw, 15px);
    width: clamp(130px, 20vw, 240px);
    height: auto;
    background-color: rgba(0, 0, 0, 0.85);
    border-radius: clamp(4px, 0.5vw, 8px);
    padding: clamp(6px, 1vw, 12px);
    z-index: 5;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
}

/* 名字行：包含名字和挑衅状态 */
.name-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: clamp(6px, 1vw, 12px);
    margin-bottom: clamp(3px, 0.5vw, 6px);
    border-bottom: 1px solid rgba(255, 204, 0, 0.3);
    padding-bottom: clamp(2px, 0.3vw, 5px);
}

.character-name {
    font-size: clamp(14px, 1.6vw, 20px);
    font-weight: bold;
    color: #ffcc00;
    text-align: left;
    font-family: 'Ma Shan Zheng', cursive;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
}

.enemy-status-area {
    position: absolute;
    top: clamp(5px, 1vw, 15px);
    right: clamp(5px, 1vw, 15px);
    width: clamp(130px, 20vw, 240px);
    height: auto;
    background-color: rgba(0, 0, 0, 0.85);
    border-radius: clamp(4px, 0.5vw, 8px);
    padding: clamp(6px, 1vw, 12px);
    z-index: 5;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
}

/* HP和气同一行显示 */
.stats-row {
    display: flex;
    align-items: center;
    gap: clamp(6px, 1vw, 12px);
}

.health-container {
    flex: 1;
    display: flex;
    align-items: center;
    position: relative;
}

.health-bar {
    flex: 1;
    height: clamp(16px, 2.2vw, 26px);
    background-color: #333;
    border-radius: clamp(2px, 0.3vw, 4px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    position: relative;
    overflow: visible;
}

.health-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: linear-gradient(to right, #ff0043, #ff6a00);
    width: 100%;
    transition: width 0.5s cubic-bezier(.4,2,.6,1);
    border-radius: clamp(2px, 0.3vw, 4px) 0 0 clamp(2px, 0.3vw, 4px);
}

/* HP数字显示在血条内部 */
.health-text {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(10px, 1.2vw, 14px);
    color: #fff;
    text-align: center;
    font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8), 
                 -1px -1px 2px rgba(0, 0, 0, 0.8),
                 1px -1px 2px rgba(0, 0, 0, 0.8),
                 -1px 1px 2px rgba(0, 0, 0, 0.8);
    white-space: nowrap;
    z-index: 2;
}

/* 气值显示在右边 */
.energy-display {
    display: flex;
    align-items: center;
    flex-shrink: 0;
}

.energy-value {
    font-size: clamp(11px, 1.3vw, 16px);
    color: #ffcc00;
    font-weight: bold;
    white-space: nowrap;
}

.energy-icon {
    display: none;
}

/* 挑衅状态显示样式 - 显示在名字右侧 */
.taunt-status {
    display: none;
    padding: clamp(1px, 0.3vw, 3px) clamp(4px, 0.6vw, 8px);
    background: linear-gradient(135deg, rgba(255, 60, 60, 0.9), rgba(180, 20, 20, 0.95));
    border-radius: clamp(2px, 0.3vw, 4px);
    font-size: clamp(9px, 1vw, 12px);
    font-weight: bold;
    color: #fff;
    text-align: center;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    animation: taunt-pulse 1s ease-in-out infinite;
    border: 1px solid rgba(255, 100, 100, 0.6);
    white-space: nowrap;
    flex-shrink: 0;
}

.taunt-status.active {
    display: inline-block;
}

@keyframes taunt-pulse {
    0% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.02); }
    100% { opacity: 0.8; transform: scale(1); }
}

/* 顶部状态栏容器 - 改为纵向排列 */
.top-status-bar {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    z-index: 20;
}

/* 回合指示器 - 可点击显示日志 */
.turn-indicator {
    position: relative;
    background-color: rgba(0, 0, 0, 0.85);
    padding: clamp(6px, 0.8vw, 12px) clamp(12px, 2vw, 25px);
    border-radius: 0 0 clamp(8px, 1.2vw, 15px) clamp(8px, 1.2vw, 15px);
    font-size: clamp(14px, 1.8vw, 22px);
    font-weight: bold;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-top: none;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
    font-family: 'Ma Shan Zheng', cursive;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
    white-space: nowrap;
    cursor: pointer;
    transition: background-color 0.2s;
}

.turn-indicator:hover {
    background-color: rgba(30, 30, 30, 0.95);
}

.turn-indicator {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.turn-indicator::after {
    content: '▼';
    font-size: clamp(8px, 1vw, 12px);
    opacity: 0.7;
    margin-top: clamp(2px, 0.3vw, 4px);
}

/* 日志下拉框 */
.log-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: clamp(280px, 50vw, 550px);
    max-height: 35vh;
    background-color: rgba(0, 0, 0, 0.75);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 0 0 clamp(6px, 1vw, 12px) clamp(6px, 1vw, 12px);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    overflow-y: auto;
    z-index: 19;
    padding: clamp(8px, 1.2vw, 15px);
}

.log-dropdown.active {
    display: block;
}

.log-dropdown p {
    margin: clamp(3px, 0.5vw, 6px) 0;
    padding: clamp(3px, 0.5vw, 6px) 0;
    font-size: clamp(13px, 1.5vw, 18px);
    color: #fff;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    line-height: 1.5;
}

.log-dropdown p:last-child {
    border-bottom: none;
}

/* ========== 场地效果指示器 - 在回合数上方 ========== */
.field-effect-indicator {
    position: relative;
    background-color: rgba(0, 0, 0, 0.85);
    padding: clamp(3px, 0.5vw, 6px) clamp(12px, 2vw, 25px);
    border-radius: 0;  /* 无圆角 */
    font-size: clamp(10px, 1.2vw, 14px);
    font-weight: bold;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-bottom: none;  /* 和下方回合数容器连接 */
    box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.6);
    font-family: 'Ma Shan Zheng', cursive;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.3s ease;
    display: none;
    justify-content: center;
}

.field-effect-indicator.active {
    display: flex;
    align-items: center;
    gap: clamp(4px, 0.6vw, 8px);
}

.field-effect-icon {
    font-size: clamp(14px, 1.8vw, 22px);
}

.field-effect-name {
    color: #fff;
}

.field-effect-timer {
    color: #ffcc00;
    font-size: clamp(10px, 1.2vw, 14px);
    opacity: 0.9;
}

/* 场地效果颜色主题 */
.field-effect-indicator.killing-intent {
    border-color: rgba(255, 60, 60, 0.6);
    background: linear-gradient(135deg, rgba(80, 20, 20, 0.95), rgba(40, 10, 10, 0.95));
}

.field-effect-indicator.miasma {
    border-color: rgba(150, 50, 200, 0.6);
    background: linear-gradient(135deg, rgba(60, 20, 80, 0.95), rgba(30, 10, 40, 0.95));
}

.field-effect-indicator.fortify {
    border-color: rgba(100, 150, 255, 0.6);
    background: linear-gradient(135deg, rgba(20, 40, 80, 0.95), rgba(10, 20, 50, 0.95));
}

.field-effect-indicator.energy-tide {
    border-color: rgba(255, 200, 50, 0.6);
    background: linear-gradient(135deg, rgba(80, 60, 20, 0.95), rgba(50, 35, 10, 0.95));
}

.field-effect-indicator.melee {
    border-color: rgba(200, 150, 100, 0.6);
    background: linear-gradient(135deg, rgba(60, 45, 30, 0.95), rgba(35, 25, 15, 0.95));
}

.field-effect-indicator.rejuvenation {
    border-color: rgba(80, 220, 120, 0.6);
    background: linear-gradient(135deg, rgba(20, 70, 40, 0.95), rgba(10, 40, 20, 0.95));
}

/* 场地效果下拉介绍框 - 相对于game-container居中显示 */
.field-effect-dropdown {
    display: none;
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    max-width: 280px;
    min-width: 180px;
    background-color: rgba(0, 0, 0, 0.95);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: clamp(6px, 1vw, 12px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
    padding: clamp(8px, 1.5vw, 14px);
    z-index: 100;
    word-wrap: break-word;
    overflow-wrap: break-word;
    box-sizing: border-box;
}

/* 场地弹窗颜色主题 - 边框颜色和场地效果一致 */
.field-effect-dropdown.killing-intent {
    border-color: rgba(255, 60, 60, 0.8);
}

.field-effect-dropdown.miasma {
    border-color: rgba(150, 50, 200, 0.8);
}

.field-effect-dropdown.fortify {
    border-color: rgba(100, 150, 255, 0.8);
}

.field-effect-dropdown.energy-tide {
    border-color: rgba(255, 200, 50, 0.8);
}

.field-effect-dropdown.melee {
    border-color: rgba(200, 150, 100, 0.8);
}

.field-effect-dropdown.rejuvenation {
    border-color: rgba(80, 220, 120, 0.8);
}

.field-effect-dropdown.active {
    display: block;
}

.field-effect-dropdown-title {
    font-size: clamp(14px, 1.8vw, 20px);
    color: #ffcc00;
    margin-bottom: clamp(6px, 1vw, 12px);
    padding-bottom: clamp(4px, 0.6vw, 8px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    gap: clamp(6px, 1vw, 10px);
}

.field-effect-dropdown-desc {
    font-size: clamp(11px, 1.3vw, 15px);
    color: #ccc;
    line-height: 1.5;
    font-family: 'ZCOOL XiaoWei', sans-serif;
}

.field-effect-dropdown-effect {
    margin-top: clamp(6px, 1vw, 10px);
    padding: clamp(5px, 0.8vw, 10px);
    background: rgba(255, 255, 255, 0.08);
    border-left: 2px solid #ffcc00;
    font-size: clamp(9px, 1.1vw, 13px);
    color: #fff;
    line-height: 1.4;
    word-wrap: break-word;
}

/* 场地效果触发动画 */
@keyframes field-effect-appear {
    0% { opacity: 0; transform: translateY(-10px); }
    100% { opacity: 1; transform: translateY(0); }
}

.field-effect-indicator.appearing {
    animation: field-effect-appear 0.5s ease-out;
}

/* 场地效果全屏提示 */
.field-effect-announce {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.7);
    z-index: 500;
    pointer-events: none;
}

.field-effect-announce.active {
    display: flex;
    animation: announce-fade 2s ease-out forwards;
}

@keyframes announce-fade {
    0% { opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
}

.field-effect-announce-content {
    text-align: center;
    animation: announce-scale 2s ease-out;
}

@keyframes announce-scale {
    0% { transform: scale(0.5); opacity: 0; }
    20% { transform: scale(1.1); opacity: 1; }
    30% { transform: scale(1); }
    80% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.2); opacity: 0; }
}

.field-effect-announce-icon {
    font-size: clamp(48px, 10vw, 80px);
    margin-bottom: clamp(10px, 2vw, 20px);
}

.field-effect-announce-name {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(32px, 6vw, 56px);
    color: #fff;
    text-shadow: 0 0 20px rgba(255, 200, 50, 0.8), 2px 2px 4px rgba(0, 0, 0, 0.8);
}

/* 命令区域 - 水墨风格 */
.command-area {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 800px;
    background-color: rgba(0, 0, 0, 0.7);
    border-radius: 10px;
    padding: 15px;
    z-index: 10;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
}

.command-label {
    margin-bottom: 10px;
    font-size: 24px;
    color: #eee;
    text-align: center;
    font-family: 'Ma Shan Zheng', cursive;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
}

.command-buttons {
    display: flex;
    justify-content: space-around;
    gap: 10px;
}

/* 指令按钮浮动样式 - 60%屏幕宽度，靠右放置 */
.command-buttons-floating {
    position: absolute;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: row;
    gap: clamp(3px, 0.5vw, 8px);
    padding: clamp(4px, 0.6vw, 10px);
    z-index: 10;
    justify-content: flex-end;
    flex-wrap: nowrap;
    width: 60%;
    max-width: 60vw;
}

.command-btn {
    flex: 1 1 0;
    min-width: 0;
    /* 使用aspect-ratio确保高度始终是宽度的2倍 */
    aspect-ratio: 1 / 2;
    height: auto;
    margin: 0;
    padding: clamp(4px, 0.6vw, 10px);
    border-radius: clamp(4px, 0.6vw, 8px);
    background: #111 !important;
    color: #fff !important;
    border: 1px solid #333;
    box-shadow: 1px 1px 4px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: visible;
}

.command-btn::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    z-index: -1;
    border-radius: clamp(4px, 0.6vw, 8px);
}

.command-btn:hover:not(.disabled) {
    background: #222 !important;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
    border-color: #666;
}

.command-btn:active:not(.disabled) {
    background: #333 !important;
    transform: translateY(0);
}

.command-btn.selected {
    background: linear-gradient(135deg, #1a3a75, #0c1f3e) !important;
    border-color: #3a6cbf;
    box-shadow: 0 0 15px rgba(58, 108, 191, 0.6);
}

/* 逃跑按钮特殊样式 */
.command-btn.escape-btn {
    background: linear-gradient(135deg, #4a1a1a, #2a0a0a) !important;
    border-color: #733;
}

.command-btn.escape-btn:hover:not(.disabled) {
    background: linear-gradient(135deg, #5a2a2a, #3a1a1a) !important;
    border-color: #944;
}

.command-btn.disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* 键位提示自适应 */
.command-btn .key-hint {
    position: absolute;
    top: clamp(2px, 0.3vw, 5px);
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(0, 0, 0, 0.7);
    color: #fff;
    font-size: clamp(8px, 1vw, 12px);
    padding: clamp(1px, 0.2vw, 3px) clamp(2px, 0.4vw, 5px);
    border-radius: clamp(2px, 0.2vw, 4px);
    line-height: 1;
}

/* 按钮名称 - 纵向排列 */
.command-btn .btn-name {
    display: block !important;
    font-size: clamp(14px, 2vw, 22px) !important;
    font-weight: bold !important;
    font-family: 'Ma Shan Zheng', cursive !important;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5) !important;
    text-align: center !important;
    line-height: 1.2 !important;
    margin-top: clamp(12px, 2vw, 20px) !important;
    writing-mode: vertical-rl !important;
    text-orientation: upright !important;
    letter-spacing: 0.15em !important;
    white-space: nowrap !important;
}

/* 战斗日志 - 隐藏（改为下拉框显示） */
.battle-log {
    display: none;
}

/* 确认弹窗 - 手机优化 */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 15px;
}

.modal-content {
    width: clamp(240px, 60vw, 320px);
    max-width: 85vw;
    border-radius: clamp(4px, 1vw, 8px);
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    color: #fff;
    position: relative;
    border: 2px solid #553c28;
    overflow: hidden;
}

.modal-header {
    padding: clamp(6px, 2vw, 12px);
    background-color: rgba(0, 0, 0, 0.6);
    font-size: clamp(14px, 3.2vw, 20px);
    font-weight: bold;
    text-align: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    font-family: 'Ma Shan Zheng', cursive;
    /* 添加黑色描边效果 */
    text-shadow: 
    -1px -1px 1px #000,
    1px -1px 1px #000,
    -1px 1px 1px #000,
    1px 1px 1px #000,
    2px 2px 3px rgba(0, 0, 0, 0.8);
}

.modal-body {
    padding: clamp(8px, 2.5vw, 15px);
    font-size: clamp(12px, 2.8vw, 16px);
    text-align: center;
    line-height: 1.4;
    /* 添加与按钮相同的字体样式 */
    font-family: 'Ma Shan Zheng', cursive;
    font-weight: bold;
    color: #fff;
    /* 黑色描边效果 */
    text-shadow: 
        -1px -1px 1px #000,
        1px -1px 1px #000,
        -1px 1px 1px #000,
        1px 1px 1px #000,
        2px 2px 3px rgba(0, 0, 0, 0.8);
}

.stats-modal-body {
    text-align: left;
}

.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(6px, 1.2vw, 10px) clamp(10px, 2vw, 14px);
}

.stats-row {
    display: flex;

/* 动画效果 */
@keyframes attack {
    0% { transform: translateX(0); }
    25% { transform: translateX(40px); }
    50% { transform: translateX(0); }
    100% { transform: translateX(0); }
}

@keyframes enemy-attack {
    0% { transform: translateX(0); }
    25% { transform: translateX(-40px); }
    50% { transform: translateX(0); }
    100% { transform: translateX(0); }
}

@keyframes hit {
    0% { filter: brightness(1); }
    25% { filter: brightness(3) saturate(2); }
    50% { filter: brightness(1); }
    100% { filter: brightness(1); }
}

@keyframes defend {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.5) hue-rotate(120deg); }
    100% { filter: brightness(1); }
}

@keyframes special {
    0% { filter: brightness(1); }
    25% { filter: brightness(2) saturate(2) hue-rotate(270deg); }
    50% { filter: brightness(1.5) saturate(1.5) hue-rotate(180deg); }
    75% { filter: brightness(2) saturate(2) hue-rotate(90deg); }
    100% { filter: brightness(1); }
}

.player-attack {
    animation: attack 0.6s ease;
}

.enemy-attack {
    animation: enemy-attack 0.6s ease;
}

.player-hit {
    animation: hit 0.6s ease;
}

.enemy-hit {
    animation: hit 0.6s ease;
}

.player-defend {
    animation: defend 1s ease;
}

.enemy-defend {
    animation: defend 1s ease;
}

.player-special {
    animation: special 1s ease;
}

.enemy-special {
    animation: special 1s ease;
}

/* 画面晃动动画 */
@keyframes shake {
  0% { transform: translate(0, 0); }
  20% { transform: translate(-10px, 0); }
  40% { transform: translate(10px, 0); }
  60% { transform: translate(-10px, 0); }
  80% { transform: translate(10px, 0); }
  100% { transform: translate(0, 0); }
}
.shake {
  animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
}

/* 受击红色边缘高亮动画 */
@keyframes damage-flash {
  0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
  30% { box-shadow: 0 0 0 20px rgba(255,0,0,0.5); }
  60% { box-shadow: 0 0 0 40px rgba(255,0,0,0.2); }
  100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
}
.damage-flash {
  animation: damage-flash 0.5s;
}

/* 主角图层 */
.player-portrait-layer {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 3;
    background: none;
    background-position: center bottom;
    background-repeat: no-repeat;
    background-size: contain;
    transition: background-image 0.3s, filter 0.2s ease;
    /* 使用CSS变量控制描边颜色，默认白色 */
    --glow-color: 255, 255, 255;
    --glow-intensity: 0.8;
    filter: drop-shadow(0 0 1px rgba(var(--glow-color), var(--glow-intensity)))
            drop-shadow(0 0 2px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.6)))
            drop-shadow(0 0 3px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.4)));
}

.player-portrait-layer.shake {
    animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
}

/* NPC图层 */
.npc-portrait-layer {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 3;
    background: none;
    background-position: center bottom;
    background-repeat: no-repeat;
    background-size: contain;
    transition: background-image 0.3s, filter 0.2s ease;
    /* 使用CSS变量控制描边颜色，默认白色 */
    --glow-color: 255, 255, 255;
    --glow-intensity: 0.8;
    filter: drop-shadow(0 0 1px rgba(var(--glow-color), var(--glow-intensity)))
            drop-shadow(0 0 2px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.6)))
            drop-shadow(0 0 3px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.4)));
}

.npc-portrait-layer.shake {
    animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
}

/* 攻击描边效果 - 黄色（轻攻击） */
.player-portrait-layer.glow-yellow,
.npc-portrait-layer.glow-yellow {
    --glow-color: 255, 215, 0;
    --glow-intensity: 1;
    filter: drop-shadow(0 0 1px rgba(var(--glow-color), var(--glow-intensity)))
            drop-shadow(0 0 2px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.6)))
            drop-shadow(0 0 3px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.4)));
}

/* 攻击描边效果 - 橙色（重攻击） */
.player-portrait-layer.glow-orange,
.npc-portrait-layer.glow-orange {
    --glow-color: 255, 140, 0;
    --glow-intensity: 1;
    filter: drop-shadow(0 0 1px rgba(var(--glow-color), var(--glow-intensity)))
            drop-shadow(0 0 2px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.6)))
            drop-shadow(0 0 3px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.4)));
}

/* 攻击描边效果 - 红色（绝招） */
.player-portrait-layer.glow-red,
.npc-portrait-layer.glow-red {
    --glow-color: 255, 48, 48;
    --glow-intensity: 1;
    filter: drop-shadow(0 0 1px rgba(var(--glow-color), var(--glow-intensity)))
            drop-shadow(0 0 2px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.6)))
            drop-shadow(0 0 3px rgba(var(--glow-color), calc(var(--glow-intensity) * 0.4)));
}

.screen-flash {
    position: fixed;
    left: 0; top: 0; right: 0; bottom: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    background: rgba(255,0,0,0.3);
    box-shadow: 0 0 0 20px rgba(255,0,0,0.5), 0 0 60px 40px rgba(255,0,0,0.2) inset;
    transition: opacity 0.2s;
}

.screen-flash.active {
    opacity: 1;
    transition: opacity 0.1s;
}

/* ========== 战斗特效图层 ========== */
/* 特效基础样式 */
.battle-effect {
    position: absolute;
    pointer-events: none;
    visibility: hidden;
    z-index: 5;  /* 高于立绘层z-index:3，确保特效可见 */
}

.battle-effect.active {
    visibility: visible;
}

/* 嘴炮特效 - 玩家（左侧，头部上方偏右） */
/* 嘴炮是透明PNG，不需要mix-blend-mode */
.player-taunt-effect {
    left: 23%;
    top: 37%;
    /* width: clamp(80px, 15vw, 180px); */
    width: 15%;
    height: auto;
    transform: scaleX(1);
}

/* 嘴炮特效 - 敌人（右侧，头部上方偏左） */
.enemy-taunt-effect {
    right: 23%;
    top: 27%;
    /* width: clamp(100px, 18vw, 220px); */
    width: 12%;
    height: auto;
    transform: scaleX(-1);
}

/* 集气特效 - 玩家（左侧脚下） */
.player-gather-effect {
    left: -13%;
    bottom: -21%;
    /* width: clamp(240px, 44vw, 560px); */
    width:  55%;
    height: auto;
}

/* 集气特效 - 敌人（右侧脚下） */
.enemy-gather-effect {
    right: -3%;
    bottom: 4%;
    /* width: clamp(188px, 35vw, 438px); */
    width: 40%;
    height: auto;
}

/* 攻击特效 - 玩家被击中（左侧身体中央） */
.player-hit-effect {
    left: -3%;
    top: 50%;
    /* width: clamp(140px, 35vw, 350px); */
    width: 40%;
    height: auto;
}

/* 攻击特效 - 敌人被击中（右侧身体中央） */
.enemy-hit-effect {
    right: 0%;
    top: 35%;
    /* width: clamp(130px, 25vw, 320px); */
    width: 27%;
    height: auto;
}

/* 特效图片样式 */
.battle-effect img {
    width: 100%;
    height: auto;
    display: block;
}

/* 黑底光效GIF使用screen混合模式，让黑色变透明 */
/* 同时增加对比度，消除边缘灰色/发白问题 */
.player-gather-effect,
.enemy-gather-effect,
.player-hit-effect,
.enemy-hit-effect {
    mix-blend-mode: screen;
}

.player-gather-effect img,
.enemy-gather-effect img,
.player-hit-effect img,
.enemy-hit-effect img {
    mix-blend-mode: screen;
    /* 增加对比度，让接近黑色的灰边变成纯黑（透明） */
    filter: contrast(1.3) brightness(1.1);
}

    const raw = urlParams.get(name);

}

function clampStat(value, min, max) {

}

    const entries = Object.entries(weights);

    return entries[0]?.[0] || null;

function preloadImage(url) {
    return new Promise((resolve, reject) => {
        if (preloadedImages.has(url)) {
            resolve(preloadedImages.get(url));
            return;
        }
        const img = new Image();
        img.onload = () => {
            preloadedImages.set(url, img);
            console.log(`[预加载] 成功: ${url.split('/').pop()}`);
            resolve(img);
        };
        img.onerror = () => {
            console.warn(`[预加载] 失败: ${url.split('/').pop()}`);
            reject(new Error(`Failed to load: ${url}`));
        };
        img.src = url;
    });
}

// 模糊匹配函数 - 计算编辑距离
function levenshteinDistance(a, b) {
    if (!a || !b) return Math.max((a || '').length, (b || '').length);
    if (a === b) return 0;
    
    const matrix = [];
    const aLen = a.length;
    const bLen = b.length;
    
    for (let i = 0; i <= bLen; i++) {
        matrix[i] = [i];
    }
    for (let j = 0; j <= aLen; j++) {
        matrix[0][j] = j;
    }
    
    for (let i = 1; i <= bLen; i++) {
        for (let j = 1; j <= aLen; j++) {
            if (b.charAt(i - 1) === a.charAt(j - 1)) {
                matrix[i][j] = matrix[i - 1][j - 1];
            } else {
                matrix[i][j] = Math.min(
                    matrix[i - 1][j - 1] + 1,
                    matrix[i][j - 1] + 1,
                    matrix[i - 1][j] + 1
                );
            }
        }
    }
    
    return matrix[bLen][aLen];
}

// 模糊匹配类别
function fuzzyMatchCategory(input) {
    if (!input || typeof input !== 'string') return '未知';
    
    const normalizedInput = input.trim();
    if (!normalizedInput) return '未知';
    
    // 1. 精确匹配
    if (ENEMY_CATEGORIES.includes(normalizedInput)) {
        return normalizedInput;
    }
    
    // 2. 同义词精确匹配
    if (CATEGORY_SYNONYMS[normalizedInput]) {
        const synonym = CATEGORY_SYNONYMS[normalizedInput];
        if (ENEMY_CATEGORIES.includes(synonym)) {
            console.log(`[类别匹配] 同义词匹配: "${normalizedInput}" -> "${synonym}"`);
            return synonym;
        }
    }
    
    // 3. 包含匹配
    for (const category of ENEMY_CATEGORIES) {
        if (normalizedInput.includes(category) || category.includes(normalizedInput)) {
            console.log(`[类别匹配] 包含匹配: "${normalizedInput}" -> "${category}"`);
            return category;
        }
    }
    
    // 4. 同义词的包含匹配
    for (const [key, value] of Object.entries(CATEGORY_SYNONYMS)) {
        if (normalizedInput.includes(key) || key.includes(normalizedInput)) {
            if (ENEMY_CATEGORIES.includes(value)) {
                console.log(`[类别匹配] 同义词包含匹配: "${normalizedInput}" (via "${key}") -> "${value}"`);
                return value;
            }
        }
    }
    
    // 5. 编辑距离匹配
    let bestMatch = '未知';
    let bestDistance = Infinity;
    const threshold = 2; // 允许的最大编辑距离
    
    for (const category of ENEMY_CATEGORIES) {
        const distance = levenshteinDistance(normalizedInput, category);
        if (distance < bestDistance && distance <= threshold) {
            bestDistance = distance;
            bestMatch = category;
        }
    }
    
    if (bestMatch !== '未知') {
        console.log(`[类别匹配] 编辑距离匹配: "${normalizedInput}" -> "${bestMatch}" (距离: ${bestDistance})`);
    } else {
        console.log(`[类别匹配] 无法匹配: "${normalizedInput}"，使用默认值"未知"`);
    }
    
    return bestMatch;
}

// 加权随机选择函数
function weightedRandom(options, debugInfo = null) {
    // options: { 'action': weight, ... }
    const entries = Object.entries(options);
    const totalWeight = entries.reduce((sum, [, weight]) => sum + weight, 0);
    const rollValue = Math.random() * totalWeight;
    let remaining = rollValue;
    
    // 如果需要调试输出
    if (debugInfo) {
        const actionNames = {
            'gather': '集气',
            'defend': '防御',
            'light-attack': '轻攻击',
            'heavy-attack': '重攻击',
            'special': '绝招',
            'taunt': '嘴炮'
        };
        const probabilities = entries.map(([action, weight]) => {
            const probability = (weight / totalWeight * 100).toFixed(1);
            return `${actionNames[action] || action}(${probability}%)`;
        });
        console.log(`[AI策略] 风格: ${debugInfo.style}, 能量范围: ${debugInfo.energyKey}`);
        console.log(`[AI策略] 参与加权的行动: ${probabilities.join(', ')}`);
        console.log(`[AI策略] Roll点: ${rollValue.toFixed(2)} / ${totalWeight} (${(rollValue / totalWeight * 100).toFixed(1)}%)`);
    }
    
    for (const [action, weight] of entries) {
        remaining -= weight;
        if (remaining <= 0) {
            if (debugInfo) {
                const actionNames = {
                    'gather': '集气',
                    'defend': '防御',
                    'light-attack': '轻攻击',
                    'heavy-attack': '重攻击',
                    'special': '绝招',
                    'taunt': '嘴炮'
                };
                console.log(`[AI策略] 选择结果: ${actionNames[action] || action}`);
            }
            return action;
        }
    }
    // 兜底返回第一个选项
    if (debugInfo) {
        console.log(`[AI策略] 选择结果(兜底): ${entries[0][0]}`);
    }
    return entries[0][0];
}

            lifesteal: npc.lifesteal,
            thorns: npc.thorns

        const appliedKeys = [];

        baseHealth = Math.round(baseHealth * 1.5);
        baseDamage = Math.round(baseDamage * 1.5);
    }
    
    return {
        name: npcName,
        maxHealth: baseHealth,
        currentHealth: baseHealth,
        energy: 0,
        energyPrecise: 0,
        maxEnergy: 10,
        selectedAction: null,
        basicDamage: baseDamage,

}

// 使用道具
function useItem(itemKey) {
    if (itemUsedThisBattle) {
        addLog('本场战斗已使用过道具！');
        return;
    }
    
    if (battleItems[itemKey] <= 0) {
        addLog('该道具数量不足！');
        return;
    }
    
    // 消耗道具
    battleItems[itemKey]--;
    itemUsedThisBattle = true;
    usedItemKey = itemKey;
    
    // 关闭弹窗
    closeItemModal();
    
    // 执行道具效果
    const config = itemConfig[itemKey];
    if (config && config.effect) {
        config.effect();
    }
    
    // 禁用道具按钮
    const itemBtn = document.getElementById('item');
    if (itemBtn) {
        itemBtn.classList.add('disabled');
    }
}

const portraitImageCache = new Map();

function getBackgroundImageUrl(element) {
    if (!element) return '';
    const bg = window.getComputedStyle(element).backgroundImage || '';
    if (bg === 'none') return '';
    const match = bg.match(/url\(["']?(.*?)["']?\)/);
    return match ? match[1] : '';
}

function getCachedPortraitImage(url) {
    if (!url) return null;
    if (portraitImageCache.has(url)) return portraitImageCache.get(url);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = url;
    const cacheEntry = { img, canvas: null, ctx: null };
    portraitImageCache.set(url, cacheEntry);
    return cacheEntry;
}

function isClickOnOpaqueBackground(event, layer) {
    if (!layer) return false;
    const url = getBackgroundImageUrl(layer);
    if (!url) return false;

    const cache = getCachedPortraitImage(url);
    if (!cache || !cache.img.complete || cache.img.naturalWidth === 0) {
        return true;
    }

    try {
        const rect = layer.getBoundingClientRect();
        const clickX = event.clientX - rect.left;
        const clickY = event.clientY - rect.top;

        const imgAspect = cache.img.naturalWidth / cache.img.naturalHeight;
        const containerAspect = rect.width / rect.height;

        let displayWidth, displayHeight, offsetX, offsetY;
        if (imgAspect > containerAspect) {
            displayWidth = rect.width;
            displayHeight = rect.width / imgAspect;
            offsetX = 0;
            offsetY = rect.height - displayHeight;
        } else {
            displayHeight = rect.height;
            displayWidth = rect.height * imgAspect;
            offsetX = (rect.width - displayWidth) / 2;
            offsetY = 0;
        }

        if (clickX < offsetX || clickX > offsetX + displayWidth ||
            clickY < offsetY || clickY > offsetY + displayHeight) {
            return false;
        }

        const pixelX = Math.floor((clickX - offsetX) / displayWidth * cache.img.naturalWidth);
        const pixelY = Math.floor((clickY - offsetY) / displayHeight * cache.img.naturalHeight);

        if (!cache.canvas) {
            cache.canvas = document.createElement('canvas');
            cache.canvas.width = cache.img.naturalWidth;
            cache.canvas.height = cache.img.naturalHeight;
            cache.ctx = cache.canvas.getContext('2d');
            cache.ctx.drawImage(cache.img, 0, 0);
        }

        const pixelData = cache.ctx.getImageData(pixelX, pixelY, 1, 1).data;
        return pixelData[3] > 30;
    } catch (error) {
        console.warn('透明度检测失败，使用默认点击行为:', error.message);
        return true;
    }
}

// 检查按钮可用性
function checkButtonAvailability() {
    // 如果不是玩家回合或正在等待确认，禁用所有按钮

        commandButtons.forEach(btn => {
            btn.classList.add('disabled');
        });
        return;
    }
    
    // 重置按钮状态
    commandButtons.forEach(btn => {
        btn.classList.remove('disabled');
        btn.classList.remove('selected');
    });
    
    // 根据能量值启用/禁用按钮
    if (gameState.player.energy < 1) {
        document.getElementById('light-attack').classList.add('disabled');
    }
    
    if (gameState.player.energy < 2) {
        document.getElementById('heavy-attack').classList.add('disabled');
    }
    
    if (gameState.player.energy < 5) {
        document.getElementById('special').classList.add('disabled');
    }
    
    // 挑衅状态下禁用防御
    if (gameState.player.tauntedTurns > 0) {
        document.getElementById('defend').classList.add('disabled');
    }
    
    // 本场战斗已使用道具则禁用道具按钮
    if (itemUsedThisBattle) {
        document.getElementById('item').classList.add('disabled');
    }
    
    // 场地效果禁用的行动（缠斗禁用嘴炮）
    if (isActionDisabledByField('taunt')) {
        document.getElementById('taunt').classList.add('disabled');
    }
    
    // 如果有选中的动作，高亮显示
    if (gameState.player.selectedAction) {
        document.getElementById(gameState.player.selectedAction).classList.add('selected');
    }
}

function initEnergyState(actor) {
    if (typeof actor.energyPrecise !== 'number') {
        actor.energyPrecise = actor.energy || 0;
    }
}

function addEnergy(actor, amount) {
    initEnergyState(actor);
    const maxEnergy = actor.maxEnergy || 10;
    actor.energyPrecise = Math.min(maxEnergy, actor.energyPrecise + amount);
    actor.energy = Math.min(maxEnergy, Math.floor(actor.energyPrecise));
}

function consumeEnergy(actor, amount) {
    initEnergyState(actor);
    actor.energyPrecise = Math.max(0, actor.energyPrecise - amount);
    actor.energy = Math.floor(actor.energyPrecise);
}

function canGainEnergy(actor) {
    initEnergyState(actor);
    return actor.energyPrecise < (actor.maxEnergy || 10);
}

// 检查并触发场地效果
function checkFieldEffectTrigger() {
    console.log(`[场地效果检查] 当前回合: ${gameState.turnNumber}, 已有效果: ${activeFieldEffect ? activeFieldEffect.name : '无'}`);
    
    // 前5回合不触发
    if (gameState.turnNumber <= 5) {
        console.log('[场地效果检查] 前5回合保护期，跳过');
        return;
    }
    
    // 已有场地效果时不触发
    if (activeFieldEffect !== null) {
        console.log('[场地效果检查] 已有场地效果，跳过');
        return;
    }
    
    // 第6回合稳定触发，之后33%概率触发
    let shouldTrigger = false;
    if (gameState.turnNumber === 6) {
        console.log('[场地效果检查] 第6回合，稳定触发');
        shouldTrigger = true;
    } else {
        const roll = Math.random();
        console.log(`[场地效果检查] 概率判定: ${(roll * 100).toFixed(1)}% (需要 <= 33%)`);
        shouldTrigger = roll <= 0.33;
    }
    
    if (!shouldTrigger) {
        console.log('[场地效果检查] 概率判定失败，不触发');

    }
    
    console.log('[场地效果检查] 触发成功！准备触发场地效果');

// 应用场地效果 - 回合开始时（气海、瘴疠、回春）
function applyFieldEffectOnTurnStart() {
    if (activeFieldEffect === null) return;
    
    const player = gameState.player;
    const enemy = gameState.enemy;
    
    switch (activeFieldEffect.id) {
        case 'energy-tide':  // 气海：双方+1气
            if (canGainEnergy(player)) {
                const beforeEnergy = player.energy;
                addEnergy(player, 1);
                const gained = player.energy - beforeEnergy;
                addLog(`【气海】${player.name}获得${gained}点气`);
            }
            if (canGainEnergy(enemy)) {
                const beforeEnergy = enemy.energy;
                addEnergy(enemy, 1);
                const gained = enemy.energy - beforeEnergy;
                addLog(`【气海】${enemy.name}获得${gained}点气`);
            }
            break;
            
        case 'miasma':  // 瘴疠：双方损失10%当前生命
            const playerDamage = Math.round(player.currentHealth * 0.1);
            const enemyDamage = Math.round(enemy.currentHealth * 0.1);
            player.currentHealth -= playerDamage;
            enemy.currentHealth -= enemyDamage;
            if (player.currentHealth < 1) player.currentHealth = 1;  // 至少保留1点
            if (enemy.currentHealth < 1) enemy.currentHealth = 1;
            addLog(`【瘴疠】${player.name}损失${playerDamage}点生命，${enemy.name}损失${enemyDamage}点生命`);
            break;
            
        case 'rejuvenation':  // 回春：双方恢复10%最大生命
            const playerHeal = Math.round(player.maxHealth * 0.1);
            const enemyHeal = Math.round(enemy.maxHealth * 0.1);
            player.currentHealth = Math.min(player.currentHealth + playerHeal, player.maxHealth);
            enemy.currentHealth = Math.min(enemy.currentHealth + enemyHeal, enemy.maxHealth);
            addLog(`【回春】${player.name}恢复${playerHeal}点生命，${enemy.name}恢复${enemyHeal}点生命`);
            break;
    }
    
    updateDisplay();
}

// 检查场地效果是否禁用某行动

    if (activeFieldEffect === null) return false;
    
    switch (activeFieldEffect.id) {

            return action === 'taunt';

}

}

// 选择动作
function selectAction(action) {
    // 如果不是玩家回合或正在等待确认，返回
    if (gameState.currentTurn !== 'player' || gameState.waitingForConfirmation) return;
    
    // 检查按钮是否被禁用
    if (document.getElementById(action).classList.contains('disabled')) {
        return;
    }
    
    // 清除之前的选择
    commandButtons.forEach(btn => btn.classList.remove('selected'));
    
    // 检查是否有足够的能量
    if ((action === 'light-attack' && gameState.player.energy < 1) ||
        (action === 'heavy-attack' && gameState.player.energy < 2) ||
        (action === 'special' && gameState.player.energy < 5)) {
        addLog('能量不足，无法执行此动作！');
        return;
    }
    
    // 设置选中状态
    document.getElementById(action).classList.add('selected');
    gameState.player.selectedAction = action;
    
    // 更新选择显示
    const actionNames = {
        'gather': '集气',
        'defend': '防御',
        'light-attack': '轻攻击',
        'heavy-attack': '重攻击',
        'special': '绝招',
        'taunt': '嘴炮'
    };
    selectedActionText.textContent = actionNames[action];
    
    // 显示确认弹窗
    confirmModal.style.display = 'flex';
}

// 确认动作
function confirmAction() {
    if (!gameState.player.selectedAction) return;
    
    // 设置为等待确认状态
    gameState.waitingForConfirmation = true;
    
    // 禁用按钮
    commandButtons.forEach(btn => {
        btn.classList.add('disabled');
    });
    
    addLog(`${gameState.player.name}准备行动...`);
    
    // 敌人AI选择动作
    selectEnemyAction();
    
    // 执行回合结算（减少延迟，提升响应速度）
    setTimeout(executeTurn, 300);
}

// 敌人AI选择动作
function selectEnemyAction() {
    const enemy = gameState.enemy;
    const player = gameState.player;
    const style = enemy.style || '风'; // 默认风格
    
    // 检查是否处于挑衅状态（不能使用防御）
    const canDefend = enemy.tauntedTurns <= 0;
    
    // 检查场地效果是否禁用嘴炮（缠斗效果）
    const canTaunt = !isActionDisabledByField('taunt');

    // 玩家气的威胁等级
    const playerEnergy = player.energy;

    // 嘴炮判定：玩家气满5时，敌人有较高概率嘴炮（缠斗时禁用）
    if (playerEnergy >= 5 && canTaunt) {
        if (style === '山' && Math.random() < 0.6) {
            enemy.selectedAction = 'taunt';
            return;
        }
        if (style === '林' && Math.random() < 0.5) {
            enemy.selectedAction = 'taunt';
            return;
        }
        if (style === '火' && Math.random() < 0.5) {
            enemy.selectedAction = 'taunt';
            return;
        }
        if (style === '风' && Math.random() < 0.4) {
            enemy.selectedAction = 'taunt';
            return;
        }
    }

    // 防御判定：玩家气较高时，敌人有概率防御（挑衅状态下不可防御）
    if (playerEnergy >= 1 && canDefend) {
        if (style === '山' && Math.random() < 0.5) {
            enemy.selectedAction = 'defend';
            return;
        }
        if (style === '林' && Math.random() < 0.3) {
            enemy.selectedAction = 'defend';
            return;
        }
        if (style === '火' && Math.random() < 0.25) {
            enemy.selectedAction = 'defend';
            return;
        }
        if (style === '风' && Math.random() < 0.25) {
            enemy.selectedAction = 'defend';
            return;
        }
    }

    // 风格主策略：基于能量范围的加权随机选择
    const styleStrategy = STYLE_STRATEGIES[style];
    if (styleStrategy) {
        const energyKey = getEnergyRangeKey(enemy.energy);
        const options = { ...styleStrategy[energyKey] };
        
        // 根据能量限制过滤不可用的行动
        if (enemy.energy < 1) {
            delete options['light-attack'];
        }
        if (enemy.energy < 2) {
            delete options['heavy-attack'];
        }
        if (enemy.energy < 5) {
            delete options['special'];
        }
        
        // 过滤掉无收益的嘴炮选项：玩家已被挑衅且气不足5时，嘴炮无收益
        if (player.tauntedTurns > 0 && playerEnergy < 5) {
            delete options['taunt'];
        }
        
        // 场地效果禁用嘴炮（缠斗）
        if (!canTaunt) {
            delete options['taunt'];
        }
        
        // 如果过滤后还有选项，使用加权随机选择
        if (Object.keys(options).length > 0) {
            const debugInfo = {
                style: style,
                energyKey: energyKey
            };
            enemy.selectedAction = weightedRandom(options, debugInfo);
            return;
        }
    }

    // 默认行为
    enemy.selectedAction = 'gather';
}

function applyCombatDamage(attacker, defender, baseDamage, defenseFactor) {
    const result = {
        damage: 0,
        crit: false,
        lifesteal: 0,
        thorns: 0
    };

    if (!baseDamage || baseDamage <= 0) {
        return result;
    }

    const factor = (typeof defenseFactor === 'number') ? defenseFactor : 1;
    const defenseDamage = factor <= 0 ? 0 : (baseDamage * factor);
    const blockValue = Math.max(0, defender.block || 0);
    const armorPenValue = Math.max(0, attacker.armorPen || 0);
    let damage = defenseDamage - blockValue + armorPenValue;
    damage = Math.max(0, Math.min(baseDamage, damage));
    damage = Math.round(damage);

    if (damage > 0 && (attacker.critRate || 0) > 0) {
        const roll = Math.random() * 100;
        if (roll < attacker.critRate) {
            result.crit = true;
            const critMultiplier = Math.max(0, (attacker.critDamage || 0) / 100);
            damage = Math.round(damage * critMultiplier);
        }
    }

    result.damage = damage;

    if (damage > 0 && (attacker.lifesteal || 0) > 0) {
        result.lifesteal = Math.round(damage * attacker.lifesteal / 100);
    }

    if (damage > 0 && (defender.thorns || 0) > 0) {
        result.thorns = Math.round(damage * defender.thorns / 100);
    }

    return result;
}

function resolveDamage(attacker, defender, baseDamage, defenseFactor) {
    const result = applyCombatDamage(attacker, defender, baseDamage, defenseFactor);
    if (result.damage > 0) {
        defender.currentHealth -= result.damage;
    }
    if (result.lifesteal > 0) {
        attacker.currentHealth = Math.min(attacker.currentHealth + result.lifesteal, attacker.maxHealth);
    }
    if (result.thorns > 0) {
        attacker.currentHealth -= result.thorns;
    }
    if (defender.currentHealth < 0) defender.currentHealth = 0;
    if (attacker.currentHealth < 0) attacker.currentHealth = 0;
    return result;
}

function logDamageEffects(attacker, defender, result) {
    if (result.crit) {
        addLog(`【暴击】${attacker.name}造成暴击！`);
    }
    if (result.lifesteal > 0) {
        addLog(`【吸血】${attacker.name}恢复${result.lifesteal}点生命！`);
    }
    if (result.thorns > 0) {
        addLog(`【反伤】${defender.name}反弹${result.thorns}点伤害！`);
    }
}

// 处理双方行动的结果
function processActions(playerAction, enemyAction) {
    const player = gameState.player;
    const enemy = gameState.enemy;
    const gameContainer = document.querySelector('.game-container');
    const npcPortraitLayer = document.querySelector('.npc-portrait-layer');
    const playerPortraitLayer = document.querySelector('.player-portrait-layer');
    const screenFlash = document.querySelector('.screen-flash');
    let playerWasHit = false;
    let enemyWasHit = false;
    let turnEnded = false;

    const markTurnEndedIfDead = () => {
        if (player.currentHealth <= 0 || enemy.currentHealth <= 0) {
            turnEnded = true;
        }
    };
    
    // 立绘动画状态追踪
    let playerDealtDamage = false;      // 玩家是否造成伤害
    let enemyDealtDamage = false;       // 敌人是否造成伤害
    let playerSpecialBroken = false;    // 玩家绝招是否被嘴炮破
    let enemySpecialBroken = false;     // 敌人绝招是否被嘴炮破
    let playerDamageAction = null;      // 玩家造成伤害的攻击类型
    let enemyDamageAction = null;       // 敌人造成伤害的攻击类型
    let playerBrokenByTaunt = false;    // 玩家被嘴炮破防
    let enemyBrokenByTaunt = false;     // 敌人被嘴炮破防
    let playerHitBySpecial = false;     // 玩家被绝招无视防御
    let enemyHitBySpecial = false;      // 敌人被绝招无视防御
    
    // 场地效果：追踪本回合双方造成的总伤害（用于杀意自伤）
    let playerTotalDamageDealt = 0;
    let enemyTotalDamageDealt = 0;
    
    // 场地效果：获取伤害倍率
    const fieldDamageMultiplier = getFieldDamageMultiplier();  // 杀意：1.5倍
    const fieldFullDefense = isFieldFullDefense();              // 固守：完全免伤
    
    // 处理集气
    if (playerAction === 'gather') {
        // 显示玩家集气特效
        showBattleEffect('player-gather-effect', 1000);
        if (canGainEnergy(player)) {
            const beforeEnergy = player.energy;
            addEnergy(player, 1 + (player.turnover || 0));
            const gained = player.energy - beforeEnergy;
            addLog(`${player.name}集气成功，能量+${gained}！`);
        } else {
            addLog(`${player.name}的能量已满！`);
        }
    }
    
    if (enemyAction === 'gather') {
        // 显示敌人集气特效
        showBattleEffect('enemy-gather-effect', 1000);
        if (canGainEnergy(enemy)) {
            const beforeEnergy = enemy.energy;
            addEnergy(enemy, 1 + (enemy.turnover || 0));
            const gained = enemy.energy - beforeEnergy;
            addLog(`${enemy.name}集气成功，能量+${gained}！`);
        } else {
            addLog(`${enemy.name}的能量已满！`);
        }
    }
    
    // 处理防御状态
    const playerDefending = playerAction === 'defend';
    const enemyDefending = enemyAction === 'defend';
    
    if (playerDefending) {
        playerCharacter.classList.add('player-defend');
        setTimeout(() => {
            playerCharacter.classList.remove('player-defend');
        }, 1000);
        addLog(`${player.name}进入防御状态！`);
    }
    
    if (enemyDefending) {
        enemyCharacter.classList.add('enemy-defend');
        setTimeout(() => {
            enemyCharacter.classList.remove('enemy-defend');
        }, 1000);
        addLog(`${enemy.name}进入防御状态！`);
    }
    
    // 嘴炮逻辑处理
    let playerTauntSuccess = false;
    let enemyTauntSuccess = false;
    
    // 双方同时嘴炮，无事发生
    if (playerAction === 'taunt' && enemyAction === 'taunt') {
        // 双方都显示嘴炮特效
        showBattleEffect('player-taunt-effect', 1500);
        showBattleEffect('enemy-taunt-effect', 1500);
        addLog('双方互相嘴炮，不分高下！');
    } else {
        // 嘴炮对防御的效果：挑衅
        if (playerAction === 'taunt' && enemyDefending) {
            // 玩家嘴炮成功，显示嘴炮特效
            showBattleEffect('player-taunt-effect', 1500);
            // 玩家嘴炮 vs 敌人防御：敌人气-1，进入挑衅状态
            if (enemy.energy > 0) {
                consumeEnergy(enemy, 1);
                addLog(`${player.name}的嘴炮激怒了${enemy.name}！${enemy.name}气-1，进入挑衅状态！`);
            } else {
                addLog(`${player.name}的嘴炮激怒了${enemy.name}！${enemy.name}进入挑衅状态！`);
            }
            enemy.tauntedTurns = 3;
            enemyWasHit = true;
            enemyBrokenByTaunt = true;  // 敌人被嘴炮破防
        }
        
        if (enemyAction === 'taunt' && playerDefending) {
            // 敌人嘴炮成功，显示嘴炮特效
            showBattleEffect('enemy-taunt-effect', 1500);
            // 敌人嘴炮 vs 玩家防御：玩家气-1，进入挑衅状态

    // 如果没有被重攻击或绝招无效，处理轻攻击

    if (!turnEnded && enemyAction === 'light-attack' &&

        if (playerDefending) {

    // 确保生命值不为负数
    if (player.currentHealth < 0) player.currentHealth = 0;
    if (enemy.currentHealth < 0) enemy.currentHealth = 0;
    
    // 场地效果：杀意自伤（攻击者承受造成伤害的25%）
    const selfDamageRatio = getFieldSelfDamageRatio();
    if (selfDamageRatio > 0) {
        if (playerTotalDamageDealt > 0) {
            const playerSelfDamage = Math.round(playerTotalDamageDealt * selfDamageRatio);
            player.currentHealth -= playerSelfDamage;
            if (player.currentHealth < 0) player.currentHealth = 0;
            addLog(`【杀意反噬】${player.name}受到${playerSelfDamage}点反伤！`);
        }
        if (enemyTotalDamageDealt > 0) {
            const enemySelfDamage = Math.round(enemyTotalDamageDealt * selfDamageRatio);
            enemy.currentHealth -= enemySelfDamage;
            if (enemy.currentHealth < 0) enemy.currentHealth = 0;
            addLog(`【杀意反噬】${enemy.name}受到${enemySelfDamage}点反伤！`);

    const playerTrueHit = playerSpecialBroken || playerBrokenByTaunt || playerHitBySpecial || (playerWasHit && !playerDefending);
    // 敌人真正受击的情况：绝招被破、被嘴炮破防、被绝招无视防御、非防御状态被打
    const enemyTrueHit = enemySpecialBroken || enemyBrokenByTaunt || enemyHitBySpecial || (enemyWasHit && !enemyDefending);
    
    if (playerTrueHit) {
        gameContainer.classList.add('shake');
        screenFlash.classList.add('active');
        playerPortraitLayer.classList.add('shake');
        setTimeout(() => {
            gameContainer.classList.remove('shake');
            screenFlash.classList.remove('active');
            playerPortraitLayer.classList.remove('shake');
        }, 400);

    if (enemyTrueHit) {
        npcPortraitLayer.classList.add('shake');
        setTimeout(() => {
            npcPortraitLayer.classList.remove('shake');
        }, 400);
    }
    
    // ========== 立绘动画逻辑 ==========
    // 确定玩家立绘状态
    let playerPortraitState = '待机';
    let playerGlowClass = null;
    
    if (playerSpecialBroken) {
        // 绝招被嘴炮破，显示受击
        playerPortraitState = '受击';
    } else if (playerDealtDamage) {
        // 造成伤害优先显示攻击
        playerPortraitState = '攻击';
        playerGlowClass = getGlowClass(playerDamageAction, true);
    } else if (playerBrokenByTaunt || playerHitBySpecial) {
        // 被嘴炮破防或被绝招无视防御，显示受击
        playerPortraitState = '受击';
    } else if (playerDefending) {
        // 防御状态（正常防御轻/重攻击）
        playerPortraitState = '防御';
    } else if (playerWasHit) {
        // 只受伤显示受击（非防御情况下被打）
        playerPortraitState = '受击';
    }
    
    // 确定敌人立绘状态
    let enemyPortraitState = '待机';
    let enemyGlowClass = null;
    
    if (enemySpecialBroken) {
        // 绝招被嘴炮破，显示受击
        enemyPortraitState = '受击';
    } else if (enemyDealtDamage) {
        // 造成伤害优先显示攻击
        enemyPortraitState = '攻击';

    } else if (enemyBrokenByTaunt || enemyHitBySpecial) {
        // 被嘴炮破防或被绝招无视防御，显示受击
        enemyPortraitState = '受击';
    } else if (enemyDefending) {
        // 防御状态（正常防御轻/重攻击）
        enemyPortraitState = '防御';
    } else if (enemyWasHit) {
        // 只受伤显示受击（非防御情况下被打）
        enemyPortraitState = '受击';
    }
    
    // 应用立绘状态
    setPortraitState(true, playerPortraitState, playerGlowClass);
    setPortraitState(false, enemyPortraitState, enemyGlowClass);
    
    // 1.0秒后恢复待机状态
    setTimeout(() => {
        resetPortraitsToIdle();
    }, 1000);
    
    // 更新显示
    updateDisplay();
}

// 继续游戏
function continueGame() {
    // 重置选择状态
    gameState.player.selectedAction = null;
    gameState.enemy.selectedAction = null;
    gameState.waitingForConfirmation = false;
    selectedActionText.textContent = '无';
    
    // 递减挑衅状态计数
    if (gameState.player.tauntedTurns > 0) {
        gameState.player.tauntedTurns--;
        if (gameState.player.tauntedTurns === 0) {
            addLog(`${gameState.player.name}的挑衅状态结束了。`);
        }
    }
    if (gameState.enemy.tauntedTurns > 0) {
        gameState.enemy.tauntedTurns--;
        if (gameState.enemy.tauntedTurns === 0) {
            addLog(`${gameState.enemy.name}的挑衅状态结束了。`);
        }
    }
    
    // 处理场地效果回合结束
    processFieldEffectTurnEnd();
    
    // 增加回合数
    gameState.turnNumber++;
    
    // 检查并触发新的场地效果
    checkFieldEffectTrigger();
    
    // 应用场地效果的回合开始效果
    setTimeout(() => {
        applyFieldEffectOnTurnStart();
        
        // 检查是否因场地效果导致战斗结束
        if (checkGameOver()) {
            return;
        }
        
        // 更新显示
        updateDisplay();
        
        // 继续游戏
        addLog('准备下一回合...');
        
        // 更新回合指示
        setTimeout(() => {
            addLog('请选择你的行动...');
        }, 500);
    }, activeFieldEffect ? 500 : 0);  // 如果有场地效果，稍微延迟让玩家看清
}

// 检查游戏是否结束
function checkGameOver() {
    if (gameState.player.currentHealth <= 0) {
        addLog(`${gameState.player.name}被击败了！游戏结束。`);
        gameEnd(false);
        return true;
    } else if (gameState.enemy.currentHealth <= 0) {
        addLog(`${gameState.enemy.name}被击败了！胜利！`);
        gameEnd(true);
        return true;
    }
    return false;
}

// //回合制系统集成更新 - 游戏结束
function gameEnd(isVictory) {
    // 禁用所有按钮
    commandButtons.forEach(btn => {
        btn.classList.add('disabled');
    });
    
    // 获取角色名字
    const playerName = gameState.player.name;
    const enemyName = gameState.enemy.name;
    
    // 设置弹窗内容
    if (isVictory) {
        gameOverTitle.textContent = '战斗胜利';
        gameOverMessage.textContent = `${playerName}战胜了${enemyName}！`;
        addLog('恭喜你取得胜利！');
    } else {
        gameOverTitle.textContent = '战斗失败';
        gameOverMessage.textContent = `${playerName}败给了${enemyName}！`;
        addLog('游戏结束，再接再厉！');
    }
    
    // 检查是否在iframe中运行
    const isInIframe = window.parent !== window;
    
    if (isInIframe) {
        // 在iframe中，隐藏重新开始按钮和整个footer
        document.getElementById('game-over-footer').style.display = 'none';
        
        // 显示游戏结束弹窗
        gameOverModal.style.display = 'flex';
        
        // 3秒后自动退出（稍微延长一点时间让玩家看到结果）
        setTimeout(() => {
            exitBattle(isVictory ? 'victory' : 'defeat');
        }, 3000);
    } else {
        // 不在iframe中，显示重新开始按钮
        document.getElementById('game-over-footer').style.display = 'flex';
        
        // 显示游戏结束弹窗
        gameOverModal.style.display = 'flex';
    }
}


// 键盘事件处理
function handleKeyPress(event) {
    // 如果道具弹窗显示中，按ESC关闭
    const itemModal = document.getElementById('item-modal');
    if (itemModal && itemModal.style.display === 'flex' && event.key === 'Escape') {
        closeItemModal();
        return;
    }
    
    // 如果弹窗显示中，按ESC关闭
    if (confirmModal.style.display === 'flex' && event.key === 'Escape') {
        confirmModal.style.display = 'none'; gameState.player.selectedAction = null;
        updateDisplay(); return;
    }


    // 如果弹窗显示中，按Enter确认
    if (confirmModal.style.display === 'flex' && event.key === 'Enter') {
        confirmModal.style.display = 'none';
        confirmAction();
        return;
    }

    // 如果不是玩家回合或正在等待确认，返回
    if (gameState.currentTurn !== 'player' || gameState.waitingForConfirmation) return;

    const key = event.key.toUpperCase();

    switch (key) {
        case 'Q':
            selectAction('gather');
            break;
        case 'W':
            selectAction('defend');
            break;
        case 'E':
            selectAction('light-attack');
            break;
        case 'R':
            selectAction('heavy-attack');
            break;
        case 'T':
            selectAction('special');
            break;
        case 'Y':
            selectAction('taunt');
            break;
        case 'U':
            openItemModal();
            break;
    }
}

// 初始化游戏 
// 动态设置1.46比例的函数 
function setAspectRatio() { 
    const gameContainer = document.querySelector('.game-container'); 
    if (!gameContainer) return;

    const viewportWidth = window.innerWidth;
    const viewportHeight = window.innerHeight;

    // 计算1.46比例的尺寸（与主界面viewport一致）
    const aspectRatio = 1.46;
    let gameWidth, gameHeight;

    // 优先基于宽度计算（高度为宽度的 1/1.46 ≈ 0.685）
    gameWidth = viewportWidth;
    gameHeight = viewportWidth / aspectRatio;

    // 如果计算出的高度超过视口高度，则根据高度反推宽度
    if (gameHeight > viewportHeight) {
        gameHeight = viewportHeight;
        gameWidth = viewportHeight * aspectRatio;
    }

    // 确保不会超出边界
    gameWidth = Math.min(gameWidth, viewportWidth);
    gameHeight = Math.min(gameHeight, viewportHeight);

    // 应用尺寸
    gameContainer.style.width = `${gameWidth}px`;
    gameContainer.style.height = `${gameHeight}px`;
    
    // 确保容器紧贴顶部
    gameContainer.style.marginTop = '0';
    
    // 水平居中（如果宽度小于视口宽度）
    if (gameWidth < viewportWidth) {
        gameContainer.style.marginLeft = `${(viewportWidth - gameWidth) / 2}px`;
        gameContainer.style.marginRight = 'auto';
    } else {
        gameContainer.style.marginLeft = '0';
        gameContainer.style.marginRight = '0';
    }

    console.log(`游戏容器尺寸: ${gameWidth}x${gameHeight}, 视口: ${viewportWidth}x${viewportHeight}, 比例: ${(gameWidth/gameHeight).toFixed(2)}`);
}

// 窗口大小变化时重新设置比例 
function handleResize() { 
    setAspectRatio(); 
}

// 初始化尺寸设置 
function initAspectRatio() { 
    setAspectRatio();

    // 监听窗口大小变化
    window.addEventListener('resize', handleResize);
    window.addEventListener('orientationchange', () => {
        // 延迟执行，等待方向变化完成
        setTimeout(setAspectRatio, 100);
    });
}

// 修改原有的DOMContentLoaded事件监听 
document.addEventListener('DOMContentLoaded', () => { 
    // 首先设置4:3比例 
    initAspectRatio();

    // 设置主背景
    const gameContainer = document.querySelector('.game-container');
    if (gameContainer) {
        gameContainer.style.backgroundImage = `url('${GAME_BG_URL}')`;
    }

    // 设置弹窗背景 - 排除道具弹窗
    const modalContents = document.querySelectorAll('.modal-content');
    modalContents.forEach(modal => {
        modal.style.background = `url('${MODAL_BG_URL}') center center / cover`;
    });
    
    // 道具弹窗使用不透明纯色背景
    const itemModalContent = document.querySelector('.item-modal-content');
    if (itemModalContent) {
        itemModalContent.style.background = 'linear-gradient(135deg, #1a1410 0%, #2a2018 50%, #1a1410 100%)';
    }

    // 初始化游戏
    initGame();
});
