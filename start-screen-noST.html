<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瀚海归义录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'ZCOOL XiaoWei', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }

        /* 背景墨色遮罩，提升对比度 */
        .backdrop {
            position: fixed;
            inset: 0;
            background: none; /* 去除遮罩 */
            pointer-events: none;
        }

        /* 外层占位容器：全屏，黑色背景充当超宽时的黑边 */
        .viewport-box {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 中央框体：宽高比超过1.46:1时加黑边，不再继续裁剪图片 */
        .frame {
            position: relative;
            width: 100%;
            max-width: calc(1.46 * 100vh);
            height: 100%;
            aspect-ratio: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            /* 横屏：以距top约30%为中线裁剪 */
            background: url('assets/image/static/开局界面.jpg') center 30% / cover no-repeat;
        }

        /* 竖屏（手机端）：居中裁剪，正常显示纵图 */
        @media (orientation: portrait) {
            .frame {
                background-position: center center;
                max-width: 100vw;
            }
        }

        /* 确保 .frame 高度始终填满，aspect-ratio 不干扰 */
        .viewport-box .frame { height: 100% !important; aspect-ratio: auto !important; }

        .hidden { display: none !important; }

        /* 新的旅程弹窗：填满开局界面大小 */
        .modal {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            background: rgba(0,0,0,0.72);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 0;
            box-shadow: none;
            color: #fff;
            overflow: hidden;
        }

        .modal.show { display: flex; }

        .modal-header {
            padding: clamp(8px, 1.8vw, 18px) clamp(10px, 2vw, 22px);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(16px, 2.2vw, 28px);
            border-bottom: 1px solid rgba(255,255,255,0.12);
            text-align: center;
        }

        .modal-body {
            flex: 1;
            overflow: auto;
            padding: clamp(10px, 2.2vw, 26px);
            display: grid;
            place-items: center;
        }

        /* 滑动条样式（适配黑色半透明弹窗） */
        .modal-body::-webkit-scrollbar { width: 10px; height: 10px; }
        .modal-body::-webkit-scrollbar-track { background: rgba(255,255,255,0.06); border-radius: 8px; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.22); border-radius: 8px; border: 1px solid rgba(0,0,0,0.25); }
        .modal-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.32); }
        .modal-body { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.22) rgba(255,255,255,0.06); }

        .grid-select {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: clamp(8px, 1.8vw, 18px);
            width: min(85%, 880px);
        }

        /* 难度选择的单列布局 */
        .diff-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: clamp(12px, 2.2vw, 22px);
            width: min(70%, 780px);
        }

        .choice-btn {
            padding: clamp(10px, 1.8vw, 18px);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: transform 160ms ease, background 200ms ease, border-color 200ms ease;
            font-family: 'ZCOOL XiaoWei', 'Microsoft YaHei', sans-serif;
            font-size: clamp(14px, 1.6vw, 18px);
            text-align: left;
        }

        .choice-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.12); }

        .choice-title { font-family: 'Ma Shan Zheng', cursive; font-size: clamp(16px, 2vw, 24px); margin-bottom: 6px; }
        .choice-desc { opacity: 0.85; line-height: 1.5; }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: clamp(8px, 1.8vw, 18px) clamp(10px, 2vw, 22px);
            border-top: 1px solid rgba(255,255,255,0.12);
        }

        .btn {
            appearance: none;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08);
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 180ms ease;
            font-family: 'ZCOOL XiaoWei', 'Microsoft YaHei', sans-serif;
        }

        .btn:hover { background: rgba(255,255,255,0.14); }
        .btn.primary { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.18); }
        .btn.primary:hover { background: rgba(255,255,255,0.24); }

        /* 角色命名 */
        .name-wrap { width: min(70%, 600px); display: flex; flex-direction: column; align-items: center; gap: clamp(14px, 2.4vw, 28px); }
        .name-label { font-family: 'Ma Shan Zheng', cursive; font-size: clamp(16px, 2.2vw, 28px); opacity: 0.9; }
        .name-input { width: 100%; padding: clamp(10px, 1.8vw, 18px); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.22); border-radius: 10px; color: #fff; font-family: 'ZCOOL XiaoWei', 'Microsoft YaHei', sans-serif; font-size: clamp(16px, 2vw, 24px); text-align: center; outline: none; transition: border-color 200ms ease; }
        .name-input:focus { border-color: rgba(255,255,255,0.45); }
        .name-input::placeholder { color: rgba(255,255,255,0.35); }
        .name-hint { font-size: clamp(12px, 1.4vw, 16px); opacity: 0.6; }

        /* 属性分配 */
        .alloc-wrap { width: min(90%, 880px); display: grid; gap: 12px; }
        .alloc-row { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 8px; padding: 8px 10px; background: rgba(255,255,255,0.06); border-radius: 8px; }
        .alloc-name { font-family: 'Ma Shan Zheng', cursive; font-size: clamp(16px, 1.8vw, 22px); }
        .alloc-value { min-width: 4ch; text-align: right; font-size: clamp(14px, 1.6vw, 18px); }
        .alloc-ops { display: flex; gap: 8px; }
        .alloc-ops button { width: 36px; height: 36px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; }
        .alloc-ops button:hover { background: rgba(255,255,255,0.16); }
        .alloc-remaining { text-align: right; opacity: 0.9; margin-top: 4px; }

        /* 标题（可选，暂不显示内容，仅保留结构以便后续扩展） */
        .title {
            position: absolute;
            top: clamp(10px, 3vw, 28px);
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(18px, 3.2vw, 42px);
            letter-spacing: 0.08em;
            color: #f2f2f2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6), 0 0 12px rgba(255,255,255,0.08);
            opacity: 0.95;
        }

        /* 菜单容器 */
        .menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(4px, 1vw, 10px);
            padding: 0;
            background: transparent;
            box-shadow: none;
            position: fixed;
            left: 70%;
            bottom: 10%;
            transform: translateX(-50%);
            z-index: 2;
        }

        /* 墨韵按钮 */
        .menu-btn {
            position: relative;
            appearance: none;
            border: none;
            background: transparent;
            color: #fff;
            cursor: pointer;
            padding: 0 clamp(16px, 2.4vw, 28px);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(13px, 2.2vh, 24px);
            letter-spacing: 0.06em;
            line-height: 1;
            border-radius: 6px;
            min-width: clamp(100px, 12vw, 180px);
            height: 5vh;
            text-align: center;
            text-shadow:
                0.05em 0 0 #000, -0.05em 0 0 #000,
                0 0.05em 0 #000, 0 -0.05em 0 #000,
                0.05em 0.05em 0 #000, -0.05em -0.05em 0 #000,
                0.05em -0.05em 0 #000, -0.05em 0.05em 0 #000;
            transition: transform 180ms ease, filter 200ms ease;
            overflow: hidden;
        }

        /* 背景图层：拉伸填充 + 左右渐变淡出，整体透明度更高 */
        .menu-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            background: url('assets/image/static/背景.png') center / 100% 100% no-repeat;
            border-radius: inherit;
            opacity: 1.0;
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 50%);
            mask-image: linear-gradient(to right, transparent 0%, black 50%);
        }

        /* 墨迹下划线（在背景图层之上） */
        .menu-btn::after {
            content: "";
            position: absolute;
            left: 8%;
            right: 8%;
            bottom: clamp(2px, 0.4vh, 5px);
            height: clamp(4px, 0.7vh, 8px);
            background: radial-gradient(60% 100% at 50% 50%, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.0) 100%);
            opacity: 0.0;
            transform: scaleX(0.8);
            transition: opacity 200ms ease, transform 200ms ease;
            filter: blur(0.6px);
            z-index: 1;
        }

        /* 选中/悬停效果 */
        .menu-btn:hover,
        .menu-btn:focus-visible,
        .menu-btn[aria-selected="true"] {
            color: #fff;
            transform: translateY(-2px) scale(1.035);
            filter: brightness(1.15);
        }

        .menu-btn:hover::after,
        .menu-btn:focus-visible::after,
        .menu-btn[aria-selected="true"]::after {
            opacity: 0.9;
            transform: scaleX(1);
        }

        /* 竖屏（手机端）：按钮保持与横屏相同的靠右位置，字体稍大 */
        @media (orientation: portrait) {
            .menu-btn {
                font-size: clamp(14px, 2.2vh, 24px);
                min-width: clamp(100px, 35vw, 220px);
            }
        }

        /* 横屏大屏：选项加大到1.3倍，间距1.5倍 */
        @media (orientation: landscape) and (min-width: 768px) {
            .menu {
                gap: clamp(6px, 1.5vw, 15px);
            }
            .menu-btn {
                font-size: clamp(17px, 2.86vh, 31px);
                height: 6.5vh;
                min-width: clamp(130px, 15.6vw, 234px);
            }
        }

        /* Responsive scale overrides for enlarged creation UI */
        .modal-header { font-size: clamp(18px, 3vw, 42px); }
        .modal-body { padding: clamp(14px, 3vw, 40px); }

        .diff-list { width: min(80%, 900px); gap: clamp(14px, 2.6vw, 28px); }
        .grid-select { width: min(90%, 1100px); gap: clamp(12px, 2.4vw, 28px); }

        .choice-btn {
            padding: clamp(14px, 2.2vw, 28px);
            font-size: clamp(16px, 2.2vw, 24px);
        }
        .choice-title { font-size: clamp(18px, 2.6vw, 32px); }
        .choice-desc { font-size: clamp(14px, 2vw, 20px); }

        .alloc-wrap { width: min(92%, 1100px); gap: clamp(10px, 1.8vw, 20px); }
        .alloc-name { font-size: clamp(18px, 2.4vw, 30px); }
        .alloc-value { font-size: clamp(16px, 2vw, 24px); }
        .alloc-ops button { width: clamp(36px, 3vw, 56px); height: clamp(36px, 3vw, 56px); }

        .btn { padding: clamp(10px, 2vw, 20px) clamp(16px, 3vw, 28px); font-size: clamp(14px, 1.8vw, 22px); }

        /* API 配置弹窗 — 与新旅程弹窗同风格 */
        .cfg-overlay {
            position: fixed;
            inset: 0;
            z-index: 5000;
            background: rgba(0,0,0,0.72);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            box-sizing: border-box;
        }
        .cfg-overlay[style*="display: flex"],
        .cfg-overlay[style*="display:flex"] { display: flex !important; }
        .cfg-panel {
            background: rgba(0,0,0,0.72);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: #fff;
            width: min(520px, 100%);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            flex-shrink: 0;
            padding: clamp(16px, 3vw, 28px);
            font-family: 'ZCOOL XiaoWei', 'Microsoft YaHei', sans-serif;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .cfg-panel::-webkit-scrollbar { width: 10px; }
        .cfg-panel::-webkit-scrollbar-track { background: rgba(255,255,255,0.06); border-radius: 8px; }
        .cfg-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.22); border-radius: 8px; }
        .cfg-panel::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.32); }
        .cfg-panel { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.22) rgba(255,255,255,0.06); }
        .cfg-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: clamp(20px, 3vw, 32px);
            text-align: center;
            margin: 0 0 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            padding-bottom: clamp(8px, 1.5vw, 14px);
        }
        .cfg-hint {
            font-size: clamp(12px, 1.4vw, 14px);
            opacity: 0.6;
            margin-bottom: 16px;
            text-align: center;
        }
        .cfg-field { margin-bottom: 14px; }
        .cfg-label {
            display: block;
            margin-bottom: 5px;
            font-size: clamp(13px, 1.5vw, 15px);
            opacity: 0.9;
        }
        .cfg-input {
            width: 100%;
            padding: 9px 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: clamp(13px, 1.5vw, 15px);
            outline: none;
            transition: border-color 200ms ease;
        }
        .cfg-input:focus { border-color: rgba(255,255,255,0.45); }
        .cfg-input::placeholder { color: rgba(255,255,255,0.35); }
        .cfg-input option { background: #1a1a1a; color: #fff; }
        .cfg-row { display: flex; align-items: center; gap: 8px; }
        .cfg-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: clamp(13px, 1.4vw, 15px);
            white-space: nowrap;
            transition: all 180ms ease;
        }
        .cfg-btn:hover { background: rgba(255,255,255,0.14); }
        .cfg-btn:disabled { opacity: 0.5; cursor: default; }
        .cfg-btn-blue { border-color: rgba(100,180,255,0.4); background: rgba(100,180,255,0.18); }
        .cfg-btn-blue:hover { background: rgba(100,180,255,0.28); }
        .cfg-btn-green { border-color: rgba(100,200,120,0.4); background: rgba(100,200,120,0.18); }
        .cfg-btn-green:hover { background: rgba(100,200,120,0.28); }
        .cfg-btn-subtle { background: rgba(255,255,255,0.06); font-size: 12px; }
        .cfg-btn-subtle:hover { background: rgba(255,255,255,0.12); }
        .cfg-status { font-size: 13px; opacity: 0.7; }
        .cfg-test-result {
            display: none;
            margin-top: 8px;
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 13px;
            word-break: break-word;
            line-height: 1.5;
        }
        .cfg-test-loading { display: block; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }
        .cfg-test-ok { display: block; background: rgba(100,200,120,0.15); color: #8eda8e; }
        .cfg-test-fail { display: block; background: rgba(255,100,100,0.15); color: #ff9090; }
        .cfg-notice {
            background: rgba(255,200,60,0.1);
            border: 1px solid rgba(255,200,60,0.2);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 12px;
            color: rgba(255,220,120,0.85);
            line-height: 1.5;
        }
        .cfg-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.12);
        }
    </style>
    <!-- 后续交互逻辑可在此处添加脚本 -->
</head>
<body>
    <div class="backdrop"></div>
    <audio id="bgm" src="https://cdn.jsdelivr.net/gh/Ji-Haitang/char_card_1@main/music/主界面.mp3" autoplay loop preload="auto" crossorigin="anonymous" playsinline></audio>
    <div class="viewport-box">
    <main class="frame" role="application" aria-label="开局界面">
        <nav class="menu" aria-label="主菜单">
            <button class="menu-btn" type="button" data-action="new" aria-selected="true">江湖新篇</button>
            <button class="menu-btn" type="button" data-action="load">重续前缘</button>
            <button class="menu-btn" type="button" data-action="difficulty">武林快报</button>
            <button class="menu-btn" type="button" data-action="apiconfig">模型设置</button>
        </nav>

        <!-- 新旅程弹窗 -->
        <section id="new-journey-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
            <header class="modal-header">新旅程 · 角色创建</header>
            <div class="modal-body" id="modal-body"></div>
            <footer class="modal-footer">
                <div>
                    <button class="btn" id="btn-back" type="button">上一步</button>
                </div>
                <div>
                    <button class="btn" id="btn-cancel" type="button">取消</button>
                    <button class="btn primary" id="btn-next" type="button">下一步</button>
                    <button class="btn primary hidden" id="btn-confirm" type="button">确定</button>
                </div>
            </footer>
        </section>
    </main>
    </div>
    
    <!-- 依赖脚本：工具、配置、状态管理（若不可用将自动降级为内存状态） -->
    <!-- 先兜底 _originalRenderer，避免外部脚本读取 undefined 报错 -->
    <script>
    (function(){
        if (!window._originalRenderer) {
            window._originalRenderer = {
                hasSTscript: typeof window.STscript === 'function',
                hasTriggerSlash: typeof window.triggerSlash === 'function'
            };
        }
    })();
    </script>
    <script src="module/game-utils.js"></script>
    <script src="module/game-config.js"></script>
    <script src="module/item-list.js"></script>
    <script src="module/variable-system.js"></script>
    <script src="module/sync-utils.js"></script>
    <script src="module/game-state.js"></script>
    <!-- 独立前端所需模块 -->
    <script src="module/idb-storage.js"></script>
    <script src="module/storage-service.js"></script>
    <script src="module/response-parser.js"></script>
    <script src="module/summary-history-service.js"></script>
    <script src="module/api-service.js"></script>
    <script src="module/embedding-service.js"></script>
    <script src="ui/config-modal.js"></script>
    <script>
    (function() {
        const $ = (sel) => document.querySelector(sel);
        const menu = document.querySelector('.menu');
        const modal = $('#new-journey-modal');
        const modalBody = $('#modal-body');
        const btnBack = $('#btn-back');
        const btnCancel = $('#btn-cancel');
        const btnNext = $('#btn-next');
        const btnConfirm = $('#btn-confirm');
        const modalHeader = document.querySelector('.modal-header');
        const menuButtons = Array.from(document.querySelectorAll('.menu-btn'));

        const ORIGIN_PRESETS = {
            "农家子弟": { "根骨": 20, "悟性": 15, "心性": 35, "魅力": 10 },
            "府兵军户": { "根骨": 35, "悟性": 15, "心性": 20, "魅力": 10 },
            "经史传家": { "根骨": 10, "悟性": 40, "心性": 15, "魅力": 15 },
            "天潢贵胄": { "根骨": 10, "悟性": 15, "心性": 15, "魅力": 40 }
        };
        const ORIGIN_STATS = {
            "农家子弟": { "武学": 30, "学识": 30, "声望": 20, "金钱": 1500 },
            "府兵军户": { "武学": 45, "学识": 20, "声望": 20, "金钱": 500 },
            "经史传家": { "武学": 20, "学识": 40, "声望": 20, "金钱": 1000 },
            "天潢贵胄": { "武学": 20, "学识": 20, "声望": 40, "金钱": 3000 }
        };
        const ORIGIN_INVENTORY = {
            "农家子弟": { "胡饼": 5, "小麦种子": 5 },
            "府兵军户": { "制式铁剑": 1 },
            "经史传家": { "普通弟子服": 1 },

            else if (state.step === 'origin') state.step = 'difficulty';
            else if (state.step === 'allocate') state.step = 'origin';
            renderStep();
        });
        btnNext.addEventListener('click', () => {
            if (state.step === 'name') {
                if (!state.playerName.trim()) return;
                state.step = 'difficulty';
            } else if (state.step === 'difficulty') {
                if (!state.difficulty) return;
                state.remaining = DIFF_POINTS[state.difficulty] || 40;
                state.step = 'origin';
            } else if (state.step === 'origin') {
                if (!state.origin) return;
                state._initAlloc = undefined;
                state.step = 'allocate';
            }
            renderStep();
        });
        btnConfirm.addEventListener('click', async () => {
            try {
                const code = DIFF_CODE[state.difficulty] || 'normal';
                // ★ 新游戏：先重置 gameData 为干净默认值，避免上一局数据残留
                if (typeof defaultGameData !== 'undefined') {
                    window.gameData = structuredClone(defaultGameData);
                }
                // 先更新运行时全局变量（注意：这些是以 let 声明的全局，不在 window 上）
                if (typeof difficulty !== 'undefined') difficulty = code;
                if (typeof playerTalents !== 'undefined') playerTalents = { ...state.talents };
                if (typeof playerStats !== 'undefined') playerStats = { ...state.stats };
                if (typeof userBackground !== 'undefined') userBackground = state.userBackground || 'A';
                if (typeof inventory !== 'undefined') inventory = { ...(state.inventory || {}) };
                // 同步到 gameData
                if (window.gameData) {
                    window.gameData.playerName = state.playerName.trim() || '主角';
                    window.gameData.difficulty = code;
                    window.gameData.playerTalents = { ...state.talents };
                    window.gameData.playerStats = { ...state.stats };
                    window.gameData.userBackground = state.userBackground || 'A';
                    window.gameData.inventory = { ...(state.inventory || {}) };
                }
                if (typeof syncGameDataFromVariables === 'function') {
                    syncGameDataFromVariables();
                }
                console.log('[StartScreen] confirm', { code, talents: state.talents });
                if (typeof saveGameData === 'function') {
                    await saveGameData();
                    console.log('[StartScreen] saveGameData done');
                }
            } catch (e) { console.warn('保存失败', e); }
            // 在渲染环境中直接把开场白发送到下一层
            try {
                // 停止背景音乐
                try { const bgm = document.getElementById('bgm'); if (bgm) { bgm.pause(); bgm.currentTime = 0; } } catch(_){}

                // === 独立模式：写入数据并跳转 index.html ===
                if (typeof getRenderFunction === 'function' && !getRenderFunction()) {
                    // 清空旧数据（防止残留）——仍写 localStorage 作为非 file:// 环境的备份
                    if (typeof storageService !== 'undefined') {
                        storageService.clearUIConversation();
                        if (typeof summaryHistoryService !== 'undefined') {
                            summaryHistoryService.clear();
                        }
                        storageService.saveAppState({ gameData: window.gameData });
                        if (typeof responseParser !== 'undefined') {
                            var finalName = state.playerName.trim() || '主角';
                            var finalOutPut = outPut.replace(/\{\{user\}\}/g, finalName);
                            var parsed = responseParser.run(finalOutPut);
                            storageService.appendUIConversation({
                                id: 'opening_' + Date.now(),
                                role: 'assistant',
                                content: parsed.mainText,
                                kind: 'opening',
                                createdAt: Date.now()
                            });
                            if (parsed.summaries && Array.isArray(parsed.summaries) && parsed.summaries.length > 0 && typeof summaryHistoryService !== 'undefined') {
                                // 开场白摘要标记为 special_event，保护其不被重生成回滚
                                summaryHistoryService.append(parsed.summaries, 'special_event');
                            }
                        }
                    }
                    // 通过 URL 参数传递意图和创建数据（file:// 下 localStorage 跨页不可用）
                    var creationPayload = {
                        n: state.playerName.trim() || '主角',
                        d: DIFF_CODE[state.difficulty] || 'normal',
                        t: state.talents,
                        s: state.stats,
                        bg: state.userBackground || 'A',
                        inv: state.inventory || {}
                    };
                    try { localStorage.setItem('jxz_launchIntent', 'newGame'); } catch(_){}
                    location.href = 'index.html?intent=newGame&creation=' + encodeURIComponent(JSON.stringify(creationPayload));
                    return;
                }

                // === ST 模式：保留原有逻辑 ===
                if (typeof isInRenderEnvironment === 'function' && isInRenderEnvironment()) {
                    const renderFunc = (typeof getRenderFunction === 'function') ? getRenderFunction() : null;
                    if (renderFunc) {
                        var stName = state.playerName.trim() || '主角';
                        var stOutPut = outPut.replace(/\{\{user\}\}/g, stName);
                        const safeOut = stOutPut.replace(/`/g, '\\`');
                        await renderFunc(`/sendas name={{char}} at={{lastMessageId}}+1 ${safeOut}`);
                    }
                }
            } catch (e) { console.warn('发送开场白失败', e); }
        });

        // 独立模式：存档列表弹窗
        function showLoadSaveModal() {
            menu.classList.add('hidden');
            modal.classList.add('show');
            modal.setAttribute('aria-hidden', 'false');
            if (modalHeader) modalHeader.textContent = '重续前缘 · 选择存档';
            btnNext.classList.add('hidden');
            btnConfirm.classList.add('hidden');
            btnBack.classList.remove('hidden');
            btnBack.disabled = false;

            var saves = (typeof storageService !== 'undefined') ? storageService.listSaves() : [];
            var html = '<div class="diff-list">';

            if (!saves || saves.length === 0) {
                html += '<div style="text-align:center;opacity:0.7;padding:20px 0">暂无存档</div>';
            } else {
                for (var i = saves.length - 1; i >= 0; i--) {
                    var s = saves[i];
                    var dateStr = s.createdAt ? new Date(s.createdAt).toLocaleString() : '';
                    html += '<button class="choice-btn" data-save-id="' + s.id + '">' +
                        '<div class="choice-title">' + (s.saveName || '未命名存档') + '</div>' +
                        '<div class="choice-desc">' + dateStr + '</div>' +
                    '</button>';
                }
            }

            html += '<button class="choice-btn" id="btn-import-save-start">' +
                '<div class="choice-title">导入存档</div>' +
                '<div class="choice-desc">从 JSON 文件恢复</div>' +
            '</button>';
            html += '</div>';
            modalBody.innerHTML = html;

            // 绑定存档选择事件
            modalBody.querySelectorAll('[data-save-id]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var saveId = this.getAttribute('data-save-id');
                    try { var bgm = document.getElementById('bgm'); if (bgm) { bgm.pause(); bgm.currentTime = 0; } } catch(_){}
                    try { localStorage.setItem('jxz_launchIntent', 'loadSave'); localStorage.setItem('jxz_loadSaveId', saveId); } catch(_){}
                    location.href = 'index.html?intent=loadSave&saveId=' + encodeURIComponent(saveId);
                });
            });

            // 绑定导入存档事件
            var btnImport = document.getElementById('btn-import-save-start');
            if (btnImport) {
                btnImport.addEventListener('click', function() {
                    var input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.json';
                    input.addEventListener('change', function() {
                        if (!input.files || !input.files[0]) return;
                        if (typeof storageService === 'undefined') { alert('存储服务不可用'); return; }
                        storageService.importSaveFromJson(input.files[0]).then(function(payload) {
                            // 直接导入完整存档 payload
                            var id = storageService.importSavePayload(payload);
                            try { var bgm = document.getElementById('bgm'); if (bgm) { bgm.pause(); bgm.currentTime = 0; } } catch(_){}
                            try { localStorage.setItem('jxz_launchIntent', 'loadSave'); localStorage.setItem('jxz_loadSaveId', id); } catch(_){}
                            location.href = 'index.html?intent=loadSave&saveId=' + encodeURIComponent(id);
                        }).catch(function(err) {
                            alert('导入失败：' + err.message);
                        });
                    });
                    input.click();
                });
            }
        }

        // 武林快报弹窗（更新/反馈）
        function showBulletinModal() {
            menu.classList.add('hidden');
            modal.classList.add('show');
            modal.setAttribute('aria-hidden', 'false');
            if (modalHeader) modalHeader.textContent = '武林快报';
            btnNext.classList.add('hidden');
            btnConfirm.classList.add('hidden');
            btnBack.disabled = false;
            if (btnBack) btnBack.classList.add('hidden');
            modalBody.innerHTML = `
                <div class="diff-list">
                    <button class="choice-btn" id="btn-news">
                        <div class="choice-title">游戏更新</div>
                        <div class="choice-desc">查看版本记录与说明</div>
                    </button>
                    <button class="choice-btn" id="btn-feedback">
                        <div class="choice-title">问题反馈</div>
                        <div class="choice-desc">加入讨论与反馈问题</div>
                    </button>
                </div>
            `;
            const openInNew = (url) => { try { window.open(url, '_blank'); } catch(_) { location.href = url; } };
            document.getElementById('btn-news').addEventListener('click', () => openInNew('https://rentry.org/Himekaidou_Hatate'));
            document.getElementById('btn-feedback').addEventListener('click', () => openInNew('https://discord.com/channels/1134557553011998840/1396776357857333349'));
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', initGame, { once: true });
    })();
    </script>
</body>
</html>
